<!DOCTYPE html>
<html lang="mn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="image_3.png">
    <title>Ironfist | Command Center v2.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-deep: #0a0f1d;
            --bg-card: #161e31;
            --accent: #38bdf8;
        }
        body { background-color: var(--bg-deep); color: #e2e8f0; font-family: 'Inter', sans-serif; }
        .glass { background: var(--bg-card); border: 1px solid rgba(255, 255, 255, 0.05); }
        .sidebar-item { border-left: 3px solid transparent; transition: all 0.2s; cursor: pointer; }
        .sidebar-item.active { background: #1e293b; border-left-color: var(--accent); color: white; }
        textarea { 
            background: #0f172a !important; 
            color: #cbd5e1 !important; 
            border: 1px solid #1e293b !important; 
            min-height: 120px;
            max-height: 800px;
            resize: vertical;
        }
        .label-style {
            font-size: 0.65rem;
            color: var(--accent);
            background: rgba(56, 189, 248, 0.1);
            padding: 2px 8px;
            border-radius: 4px;
            font-weight: bold;
            margin-bottom: 6px;
            display: inline-block;
        }
        .scrollbar::-webkit-scrollbar { width: 4px; }
        .scrollbar::-webkit-scrollbar-thumb { background: #334155; border-radius: 10px; }
    </style>
</head>
<body class="h-screen flex overflow-hidden">

    <aside class="w-72 glass flex flex-col border-r border-slate-800">
        <div class="p-6">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 bg-sky-500 rounded flex items-center justify-center">
                    <i class="fas fa-hand-fist text-white text-sm"></i>
                </div>
                <div>
                    <h1 class="text-sm font-bold tracking-wider text-white uppercase">Ironfist Squad</h1>
                    <p class="text-[9px] text-slate-500 uppercase">Command Center</p>
                </div>
            </div>
        </div>
        
        <div class="px-4 mb-6">
            <button onclick="createNewAgent()" class="w-full bg-sky-600 hover:bg-sky-500 text-white py-2 px-4 rounded transition flex items-center justify-center gap-2 text-[11px] font-bold uppercase">
                <i class="fas fa-plus"></i> New Agent
            </button>
        </div>

        <nav id="agentList" class="flex-1 overflow-y-auto scrollbar px-3 space-y-1"></nav>

        <div class="p-4 border-t border-slate-800 text-[10px] text-slate-600 flex justify-between">
            <span>STORAGE: LOCAL</span>
            <span>v2.2</span>
        </div>
    </aside>

    <main class="flex-1 flex flex-col">
        <header class="h-14 flex items-center justify-between px-8 border-b border-slate-800 bg-[#0d1324]">
            <div class="flex items-center gap-4">
                <h2 id="activeAgentName" class="text-sm font-black text-white uppercase tracking-widest cursor-pointer" onclick="renameAgent()">---</h2>
                <div id="saveStatus" class="text-[10px] text-slate-500"><i class="fas fa-circle text-emerald-500 mr-1"></i> READY</div>
            </div>
            <div class="flex gap-4">
                <button onclick="copyAllContext()" class="text-sky-400 text-[11px] font-bold uppercase"><i class="fas fa-copy mr-1"></i> Copy All</button>
                <button onclick="deleteCurrentAgent()" class="text-rose-500 text-[11px] font-bold uppercase"><i class="fas fa-trash mr-1"></i> Delete</button>
            </div>
        </header>

        <div id="editorGrid" class="flex-1 p-8 overflow-y-auto scrollbar opacity-0 transition-opacity">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <div><span class="label-style">IDENTITY.md</span><textarea id="identity" class="w-full p-4 text-sm font-mono scrollbar" oninput="autoSave()"></textarea></div>
                <div><span class="label-style">TOOLS.md</span><textarea id="tools" class="w-full p-4 text-sm font-mono scrollbar" oninput="autoSave()"></textarea></div>
                <div><span class="label-style">SOUL.md</span><textarea id="soul" class="w-full p-4 text-sm font-mono scrollbar" oninput="autoSave()"></textarea></div>
                <div><span class="label-style">AGENTS.md</span><textarea id="agents" class="w-full p-4 text-sm font-mono scrollbar" oninput="autoSave()"></textarea></div>
                <div><span class="label-style">BOOTSTRAP.md</span><textarea id="bootstrap" class="w-full p-4 text-sm font-mono scrollbar" oninput="autoSave()"></textarea></div>
                <div><span class="label-style">USER.md</span><textarea id="user" class="w-full p-4 text-sm font-mono scrollbar" oninput="autoSave()"></textarea></div>
                <div class="lg:col-span-2"><span class="label-style">HEARTBEAT.md</span><textarea id="heartbeat" class="w-full p-4 text-sm font-mono scrollbar" oninput="autoSave()"></textarea></div>
            </div>
        </div>
    </main>

    <script>
        let agents = JSON.parse(localStorage.getItem('ironfist_v2_agents')) || [];
        let currentAgentId = null;
        let saveTimeout;

        const fields = ['identity', 'tools', 'soul', 'agents', 'bootstrap', 'user', 'heartbeat'];

        function init() {
            renderAgentList();
            if (agents.length > 0) loadAgent(agents[0].id);
        }

        function createNewAgent() {
            const name = prompt("Агентын нэр оруулах:");
            if (!name) return;

            const newAgent = {
                id: Date.now(),
                name: name.toUpperCase(),
                data: fields.reduce((acc, f) => ({...acc, [f]: `# ${f.toUpperCase()}: ${name}\n---`}), {})
            };

            agents.push(newAgent);
            saveToLocal();
            renderAgentList();
            loadAgent(newAgent.id);
        }

        function renderAgentList() {
            const list = document.getElementById('agentList');
            list.innerHTML = agents.map(a => `
                <div onclick="loadAgent(${a.id})" class="sidebar-item px-4 py-3 rounded ${currentAgentId === a.id ? 'active' : ''}">
                    <span class="text-[11px] font-bold uppercase tracking-tighter">${a.name}</span>
                </div>
            `).join('');
        }

        function loadAgent(id) {
            currentAgentId = id;
            const agent = agents.find(a => a.id === id);
            if (!agent) return;

            document.getElementById('activeAgentName').innerText = agent.name;
            document.getElementById('editorGrid').style.opacity = '1';
            
            fields.forEach(f => {
                const el = document.getElementById(f);
                el.value = agent.data[f] || "";
                el.style.height = 'auto';
                el.style.height = (el.scrollHeight + 2) + 'px';
            });
            renderAgentList();
        }

        function autoSave() {
            document.getElementById('saveStatus').innerHTML = `<i class="fas fa-sync fa-spin mr-1"></i> SAVING...`;
            clearTimeout(saveTimeout);
            saveTimeout = setTimeout(() => {
                const idx = agents.findIndex(a => a.id === currentAgentId);
                if (idx > -1) {
                    fields.forEach(f => agents[idx].data[f] = document.getElementById(f).value);
                    saveToLocal();
                    document.getElementById('saveStatus').innerHTML = `<i class="fas fa-circle text-emerald-500 mr-1"></i> READY`;
                }
            }, 800);
        }

        function saveToLocal() { localStorage.setItem('ironfist_v2_agents', JSON.stringify(agents)); }
        
        function deleteCurrentAgent() {
            if (confirm("Устгах уу?")) {
                agents = agents.filter(a => a.id !== currentAgentId);
                saveToLocal();
                location.reload();
            }
        }

        function copyAllContext() {
            const agent = agents.find(a => a.id === currentAgentId);
            const text = fields.map(f => agent.data[f]).join('\n\n---\n\n');
            navigator.clipboard.writeText(text).then(() => alert("Copied!"));
        }

        init();
    </script>
</body>
</html>
